<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>First Love</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--pink:#e91e8c;--blue:#1e6ae9;--dark:#08050f;--card:#1a1030;--text:#f0e6ff;--muted:#9977bb;--border:rgba(255,255,255,0.09)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--d) ease-in-out infinite;animation-delay:var(--delay)}
@keyframes twinkle{0%,100%{opacity:0.1}50%{opacity:0.6}}

/* LANG SCREEN */
#lang-screen{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;transition:opacity 0.7s}
#lang-screen.out{opacity:0;pointer-events:none}
.lang-logo{font-family:'Playfair Display',serif;font-size:48px;font-style:italic;font-weight:400;margin-bottom:6px;text-align:center}
.lang-tagline{font-size:12px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:40px;text-align:center}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:280px}
.lang-btn{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:16px;padding:14px 20px;cursor:pointer;transition:all 0.25s;display:flex;align-items:center;gap:12px;font-family:'DM Sans',sans-serif}
.lang-btn:hover{border-color:var(--pink);background:rgba(233,30,140,0.08);transform:translateY(-2px)}
.lang-flag{font-size:22px}
.lang-info{}
.lang-name{font-size:14px;font-weight:500;color:var(--text);text-align:left}
.lang-sub{font-size:10px;color:var(--muted);text-align:left}

/* TITLE SCREEN */
#title-screen{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity 0.7s;display:none}
#title-screen.show{display:flex}
#title-screen.out{opacity:0;pointer-events:none}
.title-logo{font-family:'Playfair Display',serif;font-size:52px;font-style:italic;font-weight:400;text-align:center;margin-bottom:6px}
.title-sub{font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:28px}
.hearts-float{font-size:26px;margin:0 0 28px;animation:float 2s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.choose-lbl{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:18px}
.char-choice{display:flex;gap:18px}
.choice-card{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:20px 26px;cursor:pointer;transition:all 0.3s;text-align:center}
.choice-card:hover{transform:translateY(-4px)}
.choice-card.girl:hover{border-color:var(--pink)}
.choice-card.boy:hover{border-color:var(--blue)}
.choice-name{font-family:'Playfair Display',serif;font-size:18px;font-style:italic;margin-top:8px}
.choice-trait{font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:0.5px}
.lang-change{margin-top:24px;background:transparent;border:none;color:var(--muted);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:underline;text-underline-offset:3px}
.lang-change:hover{color:var(--text)}

/* MAIN APP */
#main-app{display:none;max-width:440px;margin:0 auto;padding:12px;position:relative;z-index:1}
#main-app.visible{display:block}
#app-title{font-family:'Playfair Display',serif;font-style:italic;font-size:22px;text-align:center;padding:10px 0 2px;letter-spacing:1px}
.app-tagline{font-size:10px;text-align:center;color:var(--muted);letter-spacing:3px;margin-bottom:10px;text-transform:uppercase}
#screen{border-radius:28px;border:2px solid;padding:14px;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;overflow:hidden}
#screen::before{content:'';position:absolute;inset:0;opacity:0.03;pointer-events:none;background-image:radial-gradient(circle,white 1px,transparent 1px);background-size:18px 18px}
.girl-screen{background:linear-gradient(160deg,#1a0a2e,#2d0a3e);border-color:#e91e8c}
.boy-screen{background:linear-gradient(160deg,#0a1a2e,#0a2840);border-color:#1e6ae9}
#top-bar{width:100%;display:flex;justify-content:space-between;align-items:center}
#name-tag{font-size:13px;font-weight:500;font-family:'Playfair Display',serif;font-style:italic}
.girl-tag{color:#ff79c6}.boy-tag{color:#79c6ff}
#link-hearts{font-size:11px}
#bubble{background:rgba(255,255,255,0.94);border-radius:18px;border:1.5px solid;padding:10px 14px;font-size:13px;color:#1a0a2a;min-height:50px;line-height:1.6;width:100%}
.girl-bubble{border-color:#ffb6e6}.boy-bubble{border-color:#b6d8ff;color:#0a0a1a}
.bubble-tail{width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:10px solid rgba(255,255,255,0.94);margin:0 auto}
#char-wrap{position:relative;width:200px;height:220px;transition:transform 0.3s ease}
#stats-row{width:100%;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.stat-box{background:rgba(255,255,255,0.06);border-radius:10px;padding:5px 8px}
.stat-lbl{font-size:9px;color:#cc99dd;margin-bottom:3px;letter-spacing:1px;text-transform:uppercase}
.stat-bar{background:rgba(255,255,255,0.1);border-radius:3px;height:5px;overflow:hidden}
.stat-fill{height:100%;border-radius:3px;transition:width 0.5s}
#btns{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.btn{background:rgba(255,255,255,0.06);border:1px solid;border-radius:20px;padding:6px 12px;font-size:11px;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;color:var(--text)}
.girl-btn{border-color:#d63fbf}.girl-btn:hover{background:#d63fbf;color:white;transform:scale(1.05)}
.boy-btn{border-color:#1e6ae9}.boy-btn:hover{background:#1e6ae9;color:white;transform:scale(1.05)}
#chat-row{display:flex;gap:6px;width:100%}
#chat-in{flex:1;background:rgba(255,255,255,0.07);border:1px solid;border-radius:20px;color:white;padding:8px 14px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none}
.girl-input{border-color:#7b3fa0}.girl-input:focus{border-color:#d63fbf}
.boy-input{border-color:#1a4a7a}.boy-input:focus{border-color:#1e6ae9}
#chat-in::placeholder{color:#9966aa}
#send{border:none;color:white;border-radius:20px;padding:8px 18px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500}
.girl-send{background:#d63fbf}.boy-send{background:#1e6ae9}
.thinking{display:inline-flex;gap:4px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:#9977bb;animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:0.2s}.dot:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,80%,100%{opacity:0.3}40%{opacity:1}}
#custom-panel{background:rgba(255,255,255,0.04);border-radius:16px;border:1px solid var(--border);padding:10px;width:100%;display:none}
#custom-panel.open{display:block}
.c-row{display:flex;align-items:center;gap:7px;margin-bottom:8px;flex-wrap:wrap}
.c-lbl{color:#cc99dd;font-size:11px;min-width:66px}
.c-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.2s;flex-shrink:0}
.c-dot.sel{border-color:white;transform:scale(1.2)}
.c-sq{padding:3px 10px;border-radius:12px;font-size:10px;cursor:pointer;border:1px solid var(--border);color:#cc99dd;background:transparent;transition:all 0.2s;font-family:'DM Sans',sans-serif}
.girl-sq.sel{background:#d63fbf;color:white;border-color:#d63fbf}
.boy-sq.sel{background:#1e6ae9;color:white;border-color:#1e6ae9}
#switch-btn{display:block;margin:8px auto 0;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:5px 16px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s}
#switch-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.3)}
#lang-indicator{position:absolute;top:10px;right:10px;font-size:18px;cursor:pointer;opacity:0.6;transition:opacity 0.2s;z-index:10}
#lang-indicator:hover{opacity:1}
</style>
</head>

function setFace(type){
  const m=document.getElementById('mouth');
  const bl=document.getElementById('blush-l'), br=document.getElementById('blush-r');
  if(!m) return;
  if(currentChar==='girl'){
    const faces={happy:{d:'M90 114 Q100 123 110 114',op:'0.7'},shy:{d:'M93 116 Q100 121 107 116',op:'1'},sad:{d:'M91 118 Q100 112 109 118',op:'0.2'},smirk:{d:'M91 114 Q102 122 108 113',op:'0.5'},neutral:{d:'M92 114 Q100 121 108 114',op:'0.6'}};
    const f=faces[type]||faces.neutral;
    m.setAttribute('d',f.d); if(bl)bl.setAttribute('opacity',f.op); if(br)br.setAttribute('opacity',f.op);
  } else {
    const faces={happy:{d:'M88 118 Q100 126 112 118'},shy:{d:'M90 120 Q100 125 110 120'},sad:{d:'M88 122 Q100 116 112 122'},smirk:{d:'M88 118 Q104 126 110 117'},neutral:{d:'M91 118 Q100 124 109 118'}};
    m.setAttribute('d',(faces[type]||faces.neutral).d);
    if(bl)bl.setAttribute('opacity',type==='shy'?'0.6':'0.4');
    if(br)br.setAttribute('opacity',type==='shy'?'0.6':'0.4');
  }
}
function bounce(){
  const w=document.getElementById('char-wrap');
  const s=charScale;
  w.style.transform=`scale(${s}) translateY(-8px)`;
  setTimeout(()=>{w.style.transform=`scale(${s})`;},320);
}
function startBlink(){
  if(blinkInterval) clearInterval(blinkInterval);
  blinkInterval=setInterval(()=>{
    const il=document.getElementById('iris-l'), ir=document.getElementById('iris-r');
    if(!il) return;
    il.setAttribute('ry','1'); ir.setAttribute('ry','1');
    setTimeout(()=>{if(il)il.setAttribute('ry',currentChar==='girl'?'10':'11');if(ir)ir.setAttribute('ry',currentChar==='girl'?'10':'11');},130);
  }, 3600+Math.random()*2000);
}

function act(type){
  if(type==='feed'){S.hunger=Math.min(100,S.hunger+22);S.mood=Math.min(100,S.mood+5);}
  if(type==='pet'){S.mood=Math.min(100,S.mood+18);S.aff=Math.min(100,S.aff+7);}
  if(type==='play'){S.mood=Math.min(100,S.mood+12);S.att=Math.min(100,S.att+18);S.aff=Math.min(100,S.aff+4);}
  if(type==='flirt'){S.mood=Math.min(100,S.mood+8);S.aff=Math.min(100,S.aff+14);}
  const arr=QUICK[currentChar][type];
  document.getElementById('bubble').innerHTML=arr[Math.floor(Math.random()*arr.length)];
  setFace(type==='flirt'?'shy':type==='play'?'smirk':'happy');
  bounce(); updBars();
}

// ─── AI ───────────────────────────────────────────────────────────────────────
async function sendMsg(){
  if(isThinking) return;
  const inp=document.getElementById('chat-in');
  const msg=inp.value.trim(); if(!msg) return;
  inp.value=''; isThinking=true;
  S.aff=Math.min(100,S.aff+4); S.att=Math.min(100,S.att+8); updBars();
  document.getElementById('bubble').innerHTML='<span class="thinking"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>';
  const tier=S.aff<30?T[lang].tierLow||'début':S.aff<65?T[lang].tierMid||'moyen':'fort';
  const sys=(currentChar==='girl'?t('sysGirl'):t('sysBoy'))+tier+`. Stats: mood ${Math.round(S.mood)}%, hunger ${Math.round(S.hunger)}%, attention ${Math.round(S.att)}%.`;
  chatHistory.push({role:'user',content:msg});
  if(chatHistory.length>20) chatHistory=chatHistory.slice(-20);
  try {
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:chatHistory})
    });
    const d=await r.json();
    const reply=d.content?.[0]?.text||'...';
    chatHistory.push({role:'assistant',content:reply});
    document.getElementById('bubble').innerHTML=reply;
    const l=msg.toLowerCase();
    setFace(l.match(/belle|beau|mignonne|cute|beautiful|bonita|linda|linda/)?'shy':l.match(/bonjour|salut|hello|hola|oi/)?'happy':'neutral');
  } catch(e){
    document.getElementById('bubble').innerHTML='...';
  }
  bounce(); isThinking=false;
}

      <button class="c-sq ${sq}" onclick="setGS(this,'short')">${t('styleShort')}</button>
    </div>
    <div class="c-row"><span class="c-lbl">${t('eyeLbl')}</span>
      <div class="c-dot sel" style="background:#7c3aed" onclick="setGE(this,'#7c3aed')"></div>
      <div class="c-dot" style="background:#1a7acc" onclick="setGE(this,'#1a7acc')"></div>
      <div class="c-dot" style="background:#1a8a3a" onclick="setGE(this,'#1a8a3a')"></div>
      <div class="c-dot" style="background:#cc4400" onclick="setGE(this,'#cc4400')"></div>
      <div class="c-dot" style="background:#cc0060" onclick="setGE(this,'#cc0060')"></div>
      <div class="c-dot" style="background:#888" onclick="setGE(this,'#888')"></div>
    </div>
    <div class="c-row"><span class="c-lbl">${t('sizeLbl')}</span>
      <button class="c-sq ${sq} sel" onclick="setSize(this,1)">${t('sizeS')}</button>
      <button class="c-sq ${sq}" onclick="setSize(this,1.15)">${t('sizeM')}</button>
      <button class="c-sq ${sq}" onclick="setSize(this,1.3)">${t('sizeL')}</button>
    </div>
    <div class="c-row"><span class="c-lbl">${t('outfitLbl')}</span>
      <button class="c-sq ${sq} sel" onclick="setOut(this,'#9b3fcc','#b060e0','#7a2aaa')">${t('outfitPurple')}</button>
      <button class="c-sq ${sq}" onclick="setOut(this,'#cc3f8f','#e060b0','#aa2a70')">${t('outfitPink')}</button>
      <button class="c-sq ${sq}" onclick="setOut(this,'#2a2a4a','#3a3a6a','#1a1a3a')">${t('outfitDark')}</button>
      <button class="c-sq ${sq}" onclick="setOut(this,'#1a4acc','#3060e0','#0a2aaa')">${t('outfitBlue')}</button>
    </div>`;
  } else {
    document.getElementById('custom-panel').innerHTML=`
    <div class="c-row"><span class="c-lbl">${t('nameLbl')}</span><input id="name-in" maxlength="12" value="${nm}" style="background:rgba(255,255,255,0.08);border:1px solid #1a4a7a;border-radius:12px;color:white;padding:4px 10px;font-size:11px;outline:none;font-family:'DM Sans',sans-serif;width:100px"/><button class="btn boy-btn" onclick="applyName()" style="padding:4px 10px;font-size:10px">${t('nameOk')}</button></div>
    <div class="c-row"><span class="c-lbl">${t('hairLbl')}</span>
      <div class="c-dot sel" style="background:#1a0a08" onclick="setBH(this,'#1a0a08')"></div>
      <div class="c-dot" style="background:#8B0000" onclick="setBH(this,'#8B0000')"></div>
      <div class="c-dot" style="background:#2d0a6e" onclick="setBH(this,'#2d0a6e')"></div>
      <div class="c-dot" style="background:#0a3a7a" onclick="setBH(this,'#0a3a7a')"></div>
      <div class="c-dot" style="background:#cccccc;border:1px solid #999" onclick="setBH(this,'#cccccc')"></div>
      <div class="c-dot" style="background:#c87020" onclick="setBH(this,'#c87020')"></div>
      <div class="c-dot" style="background:#1a5c2a" onclick="setBH(this,'#1a5c2a')"></div>
    </div>
    <div class="c-row"><span class="c-lbl">${t('eyeLbl')}</span>
      <div class="c-dot sel" style="background:#1e6ae9" onclick="setBE(this,'#1e6ae9')"></div>
      <div class="c-dot" style="background:#7c3aed" onclick="setBE(this,'#7c3aed')"></div>
      <div class="c-dot" style="background:#1a8a3a" onclick="setBE(this,'#1a8a3a')"></div>
      <div class="c-dot" style="background:#cc4400" onclick="setBE(this,'#cc4400')"></div>
      <div class="c-dot" style="background:#888" onclick="setBE(this,'#888')"></div>
    </div>
    <div class="c-row"><span class="c-lbl">${t('sizeLbl')}</span>
      <button class="c-sq ${sq} sel" onclick="setSize(this,1)">${t('sizeSB')}</button>
      <button class="c-sq ${sq}" onclick="setSize(this,1.15)">${t('sizeMB')}</button>
      <button class="c-sq ${sq}" onclick="setSize(this,1.3)">${t('sizeLB')}</button>
    </div>
    <div class="c-row"><span class="c-lbl">${t('outfitLbl')}</span>
      <button class="c-sq ${sq} sel" onclick="setBOut(this,'#1a3a6a','#1e4d8c','#0d2244')">${t('outfitNavy')}</button>
      <button class="c-sq ${sq}" onclick="setBOut(this,'#1a2a1a','#2a4a2a','#0d1a0d')">${t('outfitKhaki')}</button>
      <button class="c-sq ${sq}" onclick="setBOut(this,'#2a2a2a','#3a3a3a','#1a1a1a')">${t('outfitBlack')}</button>
      <button class="c-sq ${sq}" onclick="setBOut(this,'#4a1a2a','#6a2a3a','#2a0a1a')">${t('outfitBurg')}</button>

  }
}

// ─── CUSTOM HANDLERS ─────────────────────────────────────────────────────────
function selDot(el){document.querySelectorAll('.c-dot').forEach(e=>e.classList.remove('sel'));el.classList.add('sel');}
function setGH(el,c1,c2){selDot(el);hairC1=c1;hairC2=c2;renderChar();}
function setGS(el,s){document.querySelectorAll('.girl-sq').forEach(e=>e.classList.remove('sel'));el.classList.add('sel');hairStyle=s;renderChar();}
function setGE(el,c){selDot(el);eyeC=c;const il=document.getElementById('iris-l'),ir=document.getElementById('iris-r');if(il)il.setAttribute('fill',c);if(ir)ir.setAttribute('fill',c);}
function setBH(el,c){selDot(el);boyHairC=c;renderChar();}
function setBE(el,c){selDot(el);boyEyeC=c;const il=document.getElementById('iris-l'),ir=document.getElementById('iris-r');if(il)il.setAttribute('fill',c);if(ir)ir.setAttribute('fill',c);}
function setSize(el,s){document.querySelectorAll('[onclick^="setSize"]').forEach(e=>e.classList.remove('sel'));el.classList.add('sel');charScale=s;const w=document.getElementById('char-wrap');w.style.transform=`scale(${s})`;w.style.transformOrigin='center bottom';}
function setOut(el,b,c,sk){document.querySelectorAll('.girl-sq').forEach(e=>{if([t('outfitPurple'),t('outfitPink'),t('outfitDark'),t('outfitBlue')].includes(e.textContent))e.classList.remove('sel');});el.classList.add('sel');const bd=document.getElementById('body'),cs=document.getElementById('chest'),sk2=document.getElementById('skirt');if(bd)bd.setAttribute('fill',b);if(cs)cs.setAttribute('fill',c);if(sk2)sk2.setAttribute('fill',sk);}
function setBOut(el,b,sh,l){document.querySelectorAll('.boy-sq').forEach(e=>{if([t('outfitNavy'),t('outfitKhaki'),t('outfitBlack'),t('outfitBurg')].includes(e.textContent))e.classList.remove('sel');});el.classList.add('sel');const bd=document.getElementById('body'),cs=document.getElementById('shirt'),legs=document.querySelectorAll('rect[rx="7"]');if(bd)bd.setAttribute('fill',b);if(cs)cs.setAttribute('fill',sh);legs.forEach(r=>r.setAttribute('fill',l));}
function applyName(){const v=document.getElementById('name-in').value.trim()||charNames[currentChar];charNames[currentChar]=v;document.getElementById('dname').textContent=v;}
function toggleCustom(){document.getElementById('custom-panel').classList.toggle('open');}

// ─── START ────────────────────────────────────────────────────────────────────
function startApp(char){
  currentChar=char; S={mood:70,hunger:55,att:75,aff:0}; chatHistory=[];
  document.getElementById('title-screen').classList.add('out');
  setTimeout(()=>{
    const app=document.getElementById('main-app'); app.classList.add('visible');
    document.getElementById('app-tagline').textContent=t('tagline');
    const scr=document.getElementById('screen');
    scr.className=char==='girl'?'girl-screen':'boy-screen';
    document.getElementById('name-tag').className=char==='girl'?'girl-tag':'boy-tag';
    document.getElementById('name-tag').innerHTML=`✦ <span id="dname">${charNames[char]}</span>`;
    document.getElementById('bubble').className=char==='girl'?'girl-bubble':'boy-bubble';
    const inp=document.getElementById('chat-in');
    inp.className=char==='girl'?'girl-input':'boy-input';
    inp.placeholder=t('placeholder');
    document.getElementById('send').className=char==='girl'?'girl-send':'boy-send';
    document.getElementById('switch-btn').textContent=t('switchBtn');
    document.getElementById('sf-mood').style.background=char==='girl'?'#e91e8c':'#1e6ae9';
    document.getElementById('sf-att').style.background=char==='girl'?'#9c27b0':'#0eb8a0';
    document.getElementById('sl-mood').textContent=t('statMood');
    document.getElementById('sl-hunger').textContent=t('statHunger');
    document.getElementById('sl-att').textContent=t('statAtt');
    renderChar(); renderButtons(); renderPanel();
    document.getElementById('bubble').innerHTML=char==='girl'?t('girlGreet'):t('boyGreet');
    updBars();
    if(decayInterval) clearInterval(decayInterval);
    decayInterval=setInterval(()=>{
      S.mood=Math.max(0,S.mood-1); S.hunger=Math.max(0,S.hunger-0.6); S.att=Math.max(0,S.att-1.2);
      updBars();
      if(S.att<20&&Math.random()<0.2&&!isThinking){
        const arr=char==='girl'?t('lonely_girl'):t('lonely_boy');
        document.getElementById('bubble').innerHTML=arr[Math.floor(Math.random()*arr.length)];
        setFace('sad');
      }
    },5000);
  },700);
}
function goHome(){
  document.getElementById('main-app').classList.remove('visible');
  document.getElementById('title-screen').classList.remove('out');
  if(blinkInterval)clearInterval(blinkInterval);
  if(decayInterval)clearInterval(decayInterval);
}

// Stars
const starsEl=document.getElementById('stars');
for(let i=0;i<100;i++){
  const s=document.createElement('div'); s.className='star';
  const sz=Math.random()*2.5+0.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${3+Math.random()*5}s;--delay:${Math.random()*6}s;`;
  starsEl.appendChild(s);
}
</script>
